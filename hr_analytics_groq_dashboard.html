<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Analytics AI Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }
    .card {
      background: #1e293b;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    textarea, input {
      color: black;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>

<body class="p-6">

  <div class="max-w-7xl mx-auto space-y-6">

    <div class="card">
      <h1 class="text-3xl font-bold mb-4">HR Analytics AI Dashboard</h1>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div>
          <label class="font-semibold">Groq API Key</label>
          <input id="apiKey"
                 type="password"
                 class="w-full p-3 rounded mt-2"
                 placeholder="gsk_..." />
        </div>

        <div>
          <label class="font-semibold">Google Sheet URL</label>
          <input id="sheetUrl"
                 type="text"
                 class="w-full p-3 rounded mt-2"
                 value="https://docs.google.com/spreadsheets/d/e/2PACX-1vTKoh8d2RaxpwcT9BXtq3bqXQoVQKycqT6MAJ9VEpvqDUQ94JfFYp3QSQJaNucJiAxAOuYm_YZFyzZq/pubhtml"
          />
        </div>

      </div>

      <div class="mt-4">
        <label class="font-semibold">Prompt</label>
        <textarea id="prompt"
                  rows="5"
                  class="w-full p-3 rounded mt-2"
                  placeholder="Example: Analyze employee performance trends, identify top performers, attrition risks, training gaps, and create executive insights dashboard.">Analyze employee performance trends, identify top performers, low performers, department-wise productivity, KPI distribution, attrition risk indicators, and provide HR recommendations.</textarea>
      </div>

      <div class="mt-4 flex gap-3">
        <button onclick="runAnalysis()"
                class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded font-semibold">
          Run AI Analysis
        </button>

        <button onclick="loadSheetData()"
                class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded font-semibold">
          Preview Sheet
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="card">
        <h3 class="text-gray-300">Employees</h3>
        <p id="employeeCount" class="text-3xl font-bold mt-2">0</p>
      </div>

      <div class="card">
        <h3 class="text-gray-300">Avg Performance</h3>
        <p id="avgPerf" class="text-3xl font-bold mt-2">0</p>
      </div>

      <div class="card">
        <h3 class="text-gray-300">Top Department</h3>
        <p id="topDept" class="text-xl font-bold mt-2">-</p>
      </div>

      <div class="card">
        <h3 class="text-gray-300">High Performers</h3>
        <p id="highPerformers" class="text-3xl font-bold mt-2">0</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <div class="card">
        <h2 class="text-xl font-bold mb-4">Department Performance</h2>
        <canvas id="deptChart"></canvas>
      </div>

      <div class="card">
        <h2 class="text-xl font-bold mb-4">Performance Distribution</h2>
        <canvas id="perfChart"></canvas>
      </div>

    </div>

    <div class="card">
      <h2 class="text-2xl font-bold mb-4">AI Insights</h2>
      <div id="loading" class="hidden text-yellow-400 mb-4">
        Running Groq AI analysis...
      </div>

      <pre id="aiOutput" class="bg-black p-4 rounded text-green-300"></pre>
    </div>

    <div class="card">
      <h2 class="text-2xl font-bold mb-4">Sheet Preview</h2>

      <div class="overflow-auto">
        <table id="dataTable" class="min-w-full text-sm"></table>
      </div>
    </div>

  </div>

<script>

let globalData = [];

function convertToCSVUrl(url) {
    return url.replace('/pubhtml', '/pub?output=csv');
}

async function fetchCSV(url) {
    const response = await fetch(url);
    return await response.text();
}

function parseCSV(csv) {
    const rows = csv.split('\n').map(r => r.split(','));
    const headers = rows[0];

    return rows.slice(1)
        .filter(r => r.length > 1)
        .map(row => {
            let obj = {};
            headers.forEach((h, i) => {
                obj[h.trim()] = row[i] ? row[i].trim() : "";
            });
            return obj;
        });
}

function detectPerformanceColumn(row) {
    const keys = Object.keys(row);

    return keys.find(k =>
        k.toLowerCase().includes('performance') ||
        k.toLowerCase().includes('score') ||
        k.toLowerCase().includes('rating') ||
        k.toLowerCase().includes('kpi')
    );
}

function detectDepartmentColumn(row) {
    const keys = Object.keys(row);

    return keys.find(k =>
        k.toLowerCase().includes('department') ||
        k.toLowerCase().includes('team') ||
        k.toLowerCase().includes('division')
    );
}

async function loadSheetData() {

    try {

        const sheetUrl = document.getElementById('sheetUrl').value;

        const csvUrl = convertToCSVUrl(sheetUrl);

        const csv = await fetchCSV(csvUrl);

        const data = parseCSV(csv);

        globalData = data;

        renderTable(data);

        buildMetrics(data);

        buildCharts(data);

    } catch (err) {
        alert("Unable to load Google Sheet. Make sure the sheet is public.");
        console.error(err);
    }
}

function renderTable(data) {

    const table = document.getElementById('dataTable');

    if (!data.length) {
        table.innerHTML = "<tr><td>No data found</td></tr>";
        return;
    }

    const headers = Object.keys(data[0]);

    let html = `
      <thead>
        <tr class="bg-slate-700">
          ${headers.map(h => `<th class="p-2 border">${h}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
    `;

    data.slice(0, 20).forEach(row => {
        html += `
          <tr>
            ${headers.map(h => `<td class="p-2 border">${row[h]}</td>`).join('')}
          </tr>
        `;
    });

    html += '</tbody>';

    table.innerHTML = html;
}

function buildMetrics(data) {

    if (!data.length) return;

    const perfCol = detectPerformanceColumn(data[0]);
    const deptCol = detectDepartmentColumn(data[0]);

    let perfValues = [];

    data.forEach(r => {
        const val = parseFloat(r[perfCol]);
        if (!isNaN(val)) perfValues.push(val);
    });

    const avgPerf = perfValues.reduce((a,b)=>a+b,0) / perfValues.length;

    const highPerformers = perfValues.filter(v => v >= 4).length;

    let deptMap = {};

    data.forEach(r => {
        const dept = r[deptCol] || 'Unknown';

        if (!deptMap[dept]) deptMap[dept] = 0;

        deptMap[dept]++;
    });

    const topDept = Object.entries(deptMap)
        .sort((a,b)=>b[1]-a[1])[0]?.[0] || '-';

    document.getElementById('employeeCount').innerText = data.length;
    document.getElementById('avgPerf').innerText = avgPerf.toFixed(2);
    document.getElementById('topDept').innerText = topDept;
    document.getElementById('highPerformers').innerText = highPerformers;
}

let deptChartInstance = null;
let perfChartInstance = null;

function buildCharts(data) {

    if (!data.length) return;

    const perfCol = detectPerformanceColumn(data[0]);
    const deptCol = detectDepartmentColumn(data[0]);

    let deptScores = {};

    data.forEach(r => {

        const dept = r[deptCol] || 'Unknown';
        const perf = parseFloat(r[perfCol]);

        if (!isNaN(perf)) {

            if (!deptScores[dept]) {
                deptScores[dept] = [];
            }

            deptScores[dept].push(perf);
        }
    });

    const labels = Object.keys(deptScores);

    const averages = labels.map(l => {
        const arr = deptScores[l];
        return arr.reduce((a,b)=>a+b,0) / arr.length;
    });

    if (deptChartInstance) deptChartInstance.destroy();

    deptChartInstance = new Chart(
        document.getElementById('deptChart'),
        {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Average Performance',
                    data: averages
                }]
            }
        }
    );

    const perfValues = data.map(r => parseFloat(r[perfCol]))
                           .filter(v => !isNaN(v));

    let buckets = {
        "1-2":0,
        "2-3":0,
        "3-4":0,
        "4-5":0
    };

    perfValues.forEach(v => {
        if (v < 2) buckets["1-2"]++;
        else if (v < 3) buckets["2-3"]++;
        else if (v < 4) buckets["3-4"]++;
        else buckets["4-5"]++;
    });

    if (perfChartInstance) perfChartInstance.destroy();

    perfChartInstance = new Chart(
        document.getElementById('perfChart'),
        {
            type: 'pie',
            data: {
                labels: Object.keys(buckets),
                datasets: [{
                    data: Object.values(buckets)
                }]
            }
        }
    );
}

async function runAnalysis() {

    const apiKey = document.getElementById('apiKey').value;
    const prompt = document.getElementById('prompt').value;

    if (!apiKey) {
        alert("Enter Groq API key");
        return;
    }

    if (!globalData.length) {
        await loadSheetData();
    }

    document.getElementById('loading').classList.remove('hidden');

    try {

        const datasetPreview = JSON.stringify(globalData.slice(0, 50));

        const fullPrompt = `
You are an HR Analytics expert.

Analyze the employee performance dataset below.

Dataset:
${datasetPreview}

Task:
${prompt}

Return:
1. Executive Summary
2. Key HR Insights
3. Performance Trends
4. Attrition Risk Indicators
5. Top Performers
6. Low Performers
7. Recommended Actions
8. Dashboard KPIs
`;

        const response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {
                            role: "user",
                            content: fullPrompt
                        }
                    ],
                    temperature: 0.3
                })
            }
        );

        const result = await response.json();

        const output =
            result.choices?.[0]?.message?.content ||
            JSON.stringify(result, null, 2);

        document.getElementById('aiOutput').innerText = output;

    } catch (err) {

        console.error(err);

        document.getElementById('aiOutput').innerText =
            "Error calling Groq API.";

    }

    document.getElementById('loading').classList.add('hidden');
}

window.onload = loadSheetData;

</script>

</body>
</html>
