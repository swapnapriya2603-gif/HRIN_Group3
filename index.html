<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Talent Calibration Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen p-6">

<div class="max-w-7xl mx-auto space-y-6">

    <!-- HEADER -->

    <div class="flex items-center justify-between">

        <div>

            <h1 class="text-4xl font-bold">
                Talent Calibration Dashboard
            </h1>

            <p class="text-slate-400 mt-2">
                Live Google Sheets TSV Integration
            </p>

        </div>

        <button
            onclick="refreshDashboard()"
            class="bg-indigo-600 hover:bg-indigo-500 transition px-5 py-3 rounded-xl font-semibold"
        >
            🔄 Sync Data
        </button>

    </div>


    <!-- STATUS -->

    <div
        id="status"
        class="bg-slate-900 border border-slate-800 rounded-xl p-4"
    >
        Waiting for sync...
    </div>


    <!-- KPI -->

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
            <p class="text-slate-400 text-sm">Headcount</p>
            <h2 id="headcount" class="text-4xl font-bold mt-3">--</h2>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
            <p class="text-slate-400 text-sm">Avg Self Score</p>
            <h2 id="avgSelf" class="text-4xl font-bold mt-3 text-cyan-400">--</h2>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
            <p class="text-slate-400 text-sm">Avg Appraiser</p>
            <h2 id="avgAppraiser" class="text-4xl font-bold mt-3 text-emerald-400">--</h2>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
            <p class="text-slate-400 text-sm">Avg Final Score</p>
            <h2 id="avgFinal" class="text-4xl font-bold mt-3 text-amber-400">--</h2>
        </div>

    </div>


    <!-- TABLE -->

    <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">

        <div class="p-5 border-b border-slate-800">

            <h3 class="text-xl font-semibold">
                Employee Calibration Matrix
            </h3>

        </div>

        <div class="overflow-x-auto">

            <table class="w-full text-sm">

                <thead class="bg-slate-950">

                    <tr>

                        <th class="p-4 text-left">Emp ID</th>
                        <th class="p-4 text-left">Name</th>
                        <th class="p-4 text-left">Project</th>
                        <th class="p-4 text-center">Self</th>
                        <th class="p-4 text-center">Appraiser</th>
                        <th class="p-4 text-center">Complexity</th>
                        <th class="p-4 text-right">Final</th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                    <tr>

                        <td
                            colspan="7"
                            class="text-center p-10 text-slate-500"
                        >
                            Loading...
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>


    <!-- CHART -->

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 h-[450px]">

        <canvas id="scoreChart"></canvas>

    </div>

</div>


<script>

    /*
    ============================================================
    GOOGLE SHEETS TSV URLS
    ============================================================
    */

    const SHEETS = {

        employeeMaster:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjIMi-osLQjTUoIWI-RDHkzZFqPL1AgZlbv7qZp3B78IcP1i7xeYznxgVX5fcj3q2kTLJlv3JLh1tT/pub?gid=843812363&single=true&output=tsv",

        projectMetrics:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjIMi-osLQjTUoIWI-RDHkzZFqPL1AgZlbv7qZp3B78IcP1i7xeYznxgVX5fcj3q2kTLJlv3JLh1tT/pub?gid=746786334&single=true&output=tsv",

        selfRatings:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjIMi-osLQjTUoIWI-RDHkzZFqPL1AgZlbv7qZp3B78IcP1i7xeYznxgVX5fcj3q2kTLJlv3JLh1tT/pub?gid=1510109769&single=true&output=tsv",

        appraiserRatings:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjIMi-osLQjTUoIWI-RDHkzZFqPL1AgZlbv7qZp3B78IcP1i7xeYznxgVX5fcj3q2kTLJlv3JLh1tT/pub?gid=477035412&single=true&output=tsv",

        sampleCalibration:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjIMi-osLQjTUoIWI-RDHkzZFqPL1AgZlbv7qZp3B78IcP1i7xeYznxgVX5fcj3q2kTLJlv3JLh1tT/pub?gid=1380021398&single=true&output=tsv"
    };


    /*
    ============================================================
    GLOBALS
    ============================================================
    */

    let masterMatrix = [];

    let chartInstance = null;


    /*
    ============================================================
    NORMALIZE
    ============================================================
    */

    function clean(value) {

        return String(value || "")
            .replace(/\u00A0/g, " ")
            .replace(/\r/g, "")
            .replace(/\n/g, "")
            .trim();
    }

    function key(value) {

        return clean(value).toLowerCase();
    }


    /*
    ============================================================
    STATUS
    ============================================================
    */

    function setStatus(message, type = "info") {

        const el =
            document.getElementById("status");

        el.innerText = message;

        el.className =
            "rounded-xl p-4 border";

        if (type === "success") {

            el.classList.add(
                "bg-emerald-950/30",
                "border-emerald-700",
                "text-emerald-300"
            );
        }

        else if (type === "error") {

            el.classList.add(
                "bg-red-950/30",
                "border-red-700",
                "text-red-300"
            );
        }

        else {

            el.classList.add(
                "bg-blue-950/30",
                "border-blue-700",
                "text-blue-300"
            );
        }
    }


    /*
    ============================================================
    TSV PARSER
    ============================================================
    */

    function parseTSV(text) {

        text = text.replace(/^\uFEFF/, '');

        const lines =
            text
                .split('\n')
                .filter(line => line.trim());

        if (!lines.length)
            return [];

        const headers =
            lines[0]
                .split('\t')
                .map(h => key(h));

        return lines
            .slice(1)
            .map(line => {

                const cols =
                    line.split('\t');

                let row = {};

                headers.forEach((header, index) => {

                    row[header] =
                        clean(cols[index]);
                });

                return row;
            });
    }


    /*
    ============================================================
    FETCH SHEET
    ============================================================
    */

    async function fetchSheet(url) {

        const response =
            await fetch(url);

        if (!response.ok) {

            throw new Error(
                "Failed to fetch sheet"
            );
        }

        const text =
            await response.text();

        return parseTSV(text);
    }


    /*
    ============================================================
    MAIN LOAD
    ============================================================
    */

    async function refreshDashboard() {

        try {

            setStatus(
                "Loading sheets...",
                "info"
            );


            const [

                employeeMaster,

                projectMetrics,

                selfRatings,

                appraiserRatings

            ] = await Promise.all([

                fetchSheet(
                    SHEETS.employeeMaster
                ),

                fetchSheet(
                    SHEETS.projectMetrics
                ),

                fetchSheet(
                    SHEETS.selfRatings
                ),

                fetchSheet(
                    SHEETS.appraiserRatings
                )
            ]);


            console.log(
                employeeMaster,
                projectMetrics,
                selfRatings,
                appraiserRatings
            );


            /*
            ====================================================
            PROJECT COMPLEXITY
            ====================================================

            Complexity Formula:
            Average of:
            Delivery
            Quality
            Technical
            Collaboration
            Innovation
            Customer
            */

            const projectMap = {};

            projectMetrics.forEach(row => {

                const project =
                    key(row["project"]);

                const metrics = [

                    parseFloat(row["delivery"]) || 0,
                    parseFloat(row["quality"]) || 0,
                    parseFloat(row["technical"]) || 0,
                    parseFloat(row["collaboration"]) || 0,
                    parseFloat(row["innovation"]) || 0,
                    parseFloat(row["customer"]) || 0
                ];

                const complexity =
                    metrics.reduce(
                        (a, b) => a + b,
                        0
                    ) / metrics.length;

                projectMap[project] =
                    complexity;
            });


            /*
            ====================================================
            SELF MAP
            ====================================================
            */

            const selfMap = {};

            selfRatings.forEach(row => {

                const empId =
                    key(row["emp id"]);

                selfMap[empId] =
                    parseFloat(
                        row["weighted score"]
                    ) || 0;
            });


            /*
            ====================================================
            APPRAISER MAP
            ====================================================
            */

            const appraiserMap = {};

            appraiserRatings.forEach(row => {

                const empId =
                    key(row["emp id"]);

                appraiserMap[empId] =
                    parseFloat(
                        row["weighted score"]
                    ) || 0;
            });


            /*
            ====================================================
            BUILD MASTER MATRIX
            ====================================================
            */

            masterMatrix =
                employeeMaster.map(emp => {

                const empId =
                    key(emp["emp id"]);

                const project =
                    key(emp["project"]);

                const selfScore =
                    selfMap[empId] || 0;

                const appraiserScore =
                    appraiserMap[empId] || 0;

                const complexity =
                    projectMap[project] || 1;

                const finalScore =
                    Number(
                        (
                            appraiserScore *
                            complexity
                        ).toFixed(2)
                    );

                return {

                    empId:
                        emp["emp id"],

                    name:
                        emp["name"],

                    project:
                        emp["project"],

                    selfScore,

                    appraiserScore,

                    complexity:
                        complexity.toFixed(2),

                    finalScore
                };
            });


            console.log(masterMatrix);


            renderKPIs();

            renderTable();

            renderChart();


            setStatus(
                "Dashboard synced successfully.",
                "success"
            );
        }

        catch (err) {

            console.error(err);

            setStatus(
                err.message,
                "error"
            );
        }
    }


    /*
    ============================================================
    KPI
    ============================================================
    */

    function renderKPIs() {

        const count =
            masterMatrix.length;

        const avgSelf =
            masterMatrix.reduce(
                (a, b) =>
                    a + b.selfScore,
                0
            ) / count;

        const avgAppraiser =
            masterMatrix.reduce(
                (a, b) =>
                    a + b.appraiserScore,
                0
            ) / count;

        const avgFinal =
            masterMatrix.reduce(
                (a, b) =>
                    a + b.finalScore,
                0
            ) / count;


        document.getElementById(
            "headcount"
        ).innerText = count;

        document.getElementById(
            "avgSelf"
        ).innerText =
            avgSelf.toFixed(2);

        document.getElementById(
            "avgAppraiser"
        ).innerText =
            avgAppraiser.toFixed(2);

        document.getElementById(
            "avgFinal"
        ).innerText =
            avgFinal.toFixed(2);
    }


    /*
    ============================================================
    TABLE
    ============================================================
    */

    function renderTable() {

        const tbody =
            document.getElementById(
                "tableBody"
            );

        tbody.innerHTML =
            masterMatrix.map(row => `

                <tr class="border-b border-slate-800 hover:bg-slate-800/40">

                    <td class="p-4">
                        ${row.empId}
                    </td>

                    <td class="p-4 font-semibold">
                        ${row.name}
                    </td>

                    <td class="p-4">
                        ${row.project}
                    </td>

                    <td class="p-4 text-center">
                        ${row.selfScore}
                    </td>

                    <td class="p-4 text-center">
                        ${row.appraiserScore}
                    </td>

                    <td class="p-4 text-center text-indigo-400">
                        ${row.complexity}
                    </td>

                    <td class="p-4 text-right text-amber-400 font-bold">
                        ${row.finalScore}
                    </td>

                </tr>

            `).join('');
    }


    /*
    ============================================================
    CHART
    ============================================================
    */

    function renderChart() {

        const buckets = {

            Low: 0,
            Target: 0,
            High: 0,
            Exceptional: 0
        };


        masterMatrix.forEach(emp => {

            if (emp.finalScore < 2.5)
                buckets.Low++;

            else if (emp.finalScore < 4)
                buckets.Target++;

            else if (emp.finalScore < 5)
                buckets.High++;

            else
                buckets.Exceptional++;
        });


        const ctx =
            document.getElementById(
                "scoreChart"
            );


        if (chartInstance)
            chartInstance.destroy();


        chartInstance =
            new Chart(ctx, {

            type: "bar",

            data: {

                labels:
                    Object.keys(buckets),

                datasets: [{

                    data:
                        Object.values(buckets)
                }]
            },

            options: {

                responsive: true,

                maintainAspectRatio: false,

                plugins: {

                    legend: {
                        display: false
                    }
                }
            }
        });
    }


    /*
    ============================================================
    AUTO LOAD
    ============================================================
    */

    refreshDashboard();

</script>

</body>

</html>
