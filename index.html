<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Talent Calibration Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- XLSX Parser -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen p-6">

<div class="max-w-7xl mx-auto space-y-6">

    <!-- ===================================================== -->
    <!-- HEADER -->
    <!-- ===================================================== -->

    <div class="flex items-center justify-between">

        <div>

            <h1 class="text-4xl font-bold tracking-tight">
                Talent Calibration Dashboard
            </h1>

            <p class="text-slate-400 mt-2">
                Live Google Sheets XLSX Integration
            </p>

        </div>

        <button
            onclick="refreshDashboard()"
            class="bg-indigo-600 hover:bg-indigo-500 transition px-5 py-3 rounded-xl font-semibold shadow-lg"
        >
            🔄 Sync Data
        </button>

    </div>


    <!-- ===================================================== -->
    <!-- STATUS -->
    <!-- ===================================================== -->

    <div
        id="status"
        class="bg-slate-900 border border-slate-800 rounded-xl p-4 text-slate-300"
    >
        Waiting for sync...
    </div>


    <!-- ===================================================== -->
    <!-- KPI CARDS -->
    <!-- ===================================================== -->

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
            <p class="text-slate-400 text-sm">
                Headcount
            </p>

            <h2
                id="headcount"
                class="text-4xl font-bold mt-3"
            >
                --
            </h2>
        </div>


        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">

            <p class="text-slate-400 text-sm">
                Avg Appraiser
            </p>

            <h2
                id="avgAppraiser"
                class="text-4xl font-bold mt-3 text-emerald-400"
            >
                --
            </h2>

        </div>


        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">

            <p class="text-slate-400 text-sm">
                Avg Complexity
            </p>

            <h2
                id="avgComplexity"
                class="text-4xl font-bold mt-3 text-indigo-400"
            >
                --
            </h2>

        </div>


        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">

            <p class="text-slate-400 text-sm">
                Avg Final Score
            </p>

            <h2
                id="avgFinal"
                class="text-4xl font-bold mt-3 text-amber-400"
            >
                --
            </h2>

        </div>

    </div>


    <!-- ===================================================== -->
    <!-- TABLE -->
    <!-- ===================================================== -->

    <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">

        <div class="p-5 border-b border-slate-800">

            <h3 class="text-xl font-semibold">
                Employee Calibration Matrix
            </h3>

        </div>

        <div class="overflow-x-auto">

            <table class="w-full text-sm">

                <thead class="bg-slate-950 text-slate-300">

                    <tr>

                        <th class="p-4 text-left">Emp ID</th>
                        <th class="p-4 text-left">Name</th>
                        <th class="p-4 text-left">Project</th>
                        <th class="p-4 text-center">Self</th>
                        <th class="p-4 text-center">Appraiser</th>
                        <th class="p-4 text-center">Complexity</th>
                        <th class="p-4 text-right">Final</th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                    <tr>

                        <td
                            colspan="7"
                            class="p-10 text-center text-slate-500"
                        >
                            No data loaded
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>


    <!-- ===================================================== -->
    <!-- CHART -->
    <!-- ===================================================== -->

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 h-[450px]">

        <canvas id="scoreChart"></canvas>

    </div>

</div>


<script>

    /*
    ============================================================
    GOOGLE SHEETS XLSX URL
    ============================================================
    */

    const XLSX_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjIMi-osLQjTUoIWI-RDHkzZFqPL1AgZlbv7qZp3B78IcP1i7xeYznxgVX5fcj3q2kTLJlv3JLh1tT/pub?output=xlsx";


    /*
    ============================================================
    GLOBALS
    ============================================================
    */

    let masterMatrix = [];

    let chartInstance = null;


    /*
    ============================================================
    STATUS
    ============================================================
    */

    function setStatus(message, type = "info") {

        const el = document.getElementById("status");

        el.innerText = message;

        el.className =
            "rounded-xl p-4 border";

        if (type === "success") {

            el.classList.add(
                "bg-emerald-950/30",
                "border-emerald-700",
                "text-emerald-300"
            );
        }

        else if (type === "error") {

            el.classList.add(
                "bg-red-950/30",
                "border-red-700",
                "text-red-300"
            );
        }

        else {

            el.classList.add(
                "bg-blue-950/30",
                "border-blue-700",
                "text-blue-300"
            );
        }
    }


    /*
    ============================================================
    LOAD XLSX WORKBOOK
    ============================================================
    */

    async function loadWorkbook() {

        const response = await fetch(XLSX_URL);

        if (!response.ok) {
            throw new Error(
                "Failed to fetch Google Sheets workbook"
            );
        }

        const arrayBuffer =
            await response.arrayBuffer();

        return XLSX.read(
            arrayBuffer,
            {
                type: "array"
            }
        );
    }


    /*
    ============================================================
    READ SHEET
    ============================================================
    */

    function getSheet(workbook, sheetName) {

        const worksheet =
            workbook.Sheets[sheetName];

        if (!worksheet) {

            throw new Error(
                `Sheet not found: ${sheetName}`
            );
        }

        return XLSX.utils.sheet_to_json(
            worksheet,
            {
                raw: false,
                defval: ""
            }
        );
    }


    /*
    ============================================================
    MAIN REFRESH
    ============================================================
    */

    async function refreshDashboard() {

        try {

            setStatus(
                "Loading workbook...",
                "info"
            );

            const workbook =
                await loadWorkbook();


            /*
            ====================================================
            SHEETS
            ====================================================
            */

            const employeeMaster =
                getSheet(
                    workbook,
                    "Employee_Master"
                );

            const projectMetrics =
                getSheet(
                    workbook,
                    "Project_Metrics"
                );

            const selfRatings =
                getSheet(
                    workbook,
                    "Self_Ratings_Data"
                );

            const appraiserRatings =
                getSheet(
                    workbook,
                    "Appraiser_Ratings_Data"
                );


            /*
            ====================================================
            LOOKUP MAPS
            ====================================================
            */

            const selfMap = {};

            const appraiserMap = {};

            const projectMap = {};


            selfRatings.forEach(row => {

                const empId =
                    String(
                        row["Emp ID"]
                    ).trim();

                selfMap[empId] = row;
            });


            appraiserRatings.forEach(row => {

                const empId =
                    String(
                        row["Emp ID"]
                    ).trim();

                appraiserMap[empId] = row;
            });


            projectMetrics.forEach(row => {

                const project =
                    String(
                        row["Project"]
                    ).trim();

                projectMap[project] = row;
            });


            /*
            ====================================================
            BUILD MASTER MATRIX
            ====================================================
            */

            masterMatrix =
                employeeMaster.map(emp => {

                const empId =
                    String(
                        emp["Emp ID"]
                    ).trim();

                const project =
                    String(
                        emp["Project"]
                    ).trim();

                const self =
                    selfMap[empId] || {};

                const appraiser =
                    appraiserMap[empId] || {};

                const metric =
                    projectMap[project] || {};


                const selfScore =
                    parseFloat(
                        self["Weighted Score"]
                    ) || 0;

                const appraiserScore =
                    parseFloat(
                        appraiser["Weighted Score"]
                    ) || 0;

                const complexity =
                    parseFloat(
                        metric["Project Complexity Factor"]
                    ) || 1;


                const finalScore =
                    Number(
                        (
                            appraiserScore *
                            complexity
                        ).toFixed(2)
                    );


                return {

                    empId,

                    name:
                        emp["Name"] || "",

                    manager:
                        emp["Manager"] || "",

                    project,

                    selfScore,

                    appraiserScore,

                    complexity,

                    finalScore
                };
            });


            console.log(masterMatrix);


            renderKPIs();

            renderTable();

            renderChart();


            setStatus(
                "Dashboard synced successfully.",
                "success"
            );

        }

        catch (err) {

            console.error(err);

            setStatus(
                err.message,
                "error"
            );
        }
    }


    /*
    ============================================================
    KPI RENDER
    ============================================================
    */

    function renderKPIs() {

        const count =
            masterMatrix.length;

        const avgAppraiser =
            masterMatrix.reduce(
                (a, b) => a + b.appraiserScore,
                0
            ) / count;

        const avgComplexity =
            masterMatrix.reduce(
                (a, b) => a + b.complexity,
                0
            ) / count;

        const avgFinal =
            masterMatrix.reduce(
                (a, b) => a + b.finalScore,
                0
            ) / count;


        document.getElementById(
            "headcount"
        ).innerText = count;

        document.getElementById(
            "avgAppraiser"
        ).innerText =
            avgAppraiser.toFixed(2);

        document.getElementById(
            "avgComplexity"
        ).innerText =
            avgComplexity.toFixed(2);

        document.getElementById(
            "avgFinal"
        ).innerText =
            avgFinal.toFixed(2);
    }


    /*
    ============================================================
    TABLE RENDER
    ============================================================
    */

    function renderTable() {

        const tbody =
            document.getElementById(
                "tableBody"
            );

        tbody.innerHTML =
            masterMatrix.map(row => `

                <tr class="border-b border-slate-800 hover:bg-slate-800/40">

                    <td class="p-4">
                        ${row.empId}
                    </td>

                    <td class="p-4 font-semibold">
                        ${row.name}
                    </td>

                    <td class="p-4">
                        ${row.project}
                    </td>

                    <td class="p-4 text-center">
                        ${row.selfScore}
                    </td>

                    <td class="p-4 text-center">
                        ${row.appraiserScore}
                    </td>

                    <td class="p-4 text-center text-indigo-400">
                        ${row.complexity}
                    </td>

                    <td class="p-4 text-right text-amber-400 font-bold">
                        ${row.finalScore}
                    </td>

                </tr>

            `).join('');
    }


    /*
    ============================================================
    CHART
    ============================================================
    */

    function renderChart() {

        const buckets = {

            Low: 0,
            Target: 0,
            High: 0,
            Exceptional: 0
        };


        masterMatrix.forEach(emp => {

            if (emp.finalScore < 2.5)
                buckets.Low++;

            else if (emp.finalScore < 4)
                buckets.Target++;

            else if (emp.finalScore < 5)
                buckets.High++;

            else
                buckets.Exceptional++;
        });


        const ctx =
            document.getElementById(
                "scoreChart"
            );


        if (chartInstance)
            chartInstance.destroy();


        chartInstance =
            new Chart(ctx, {

            type: "bar",

            data: {

                labels:
                    Object.keys(buckets),

                datasets: [{
                    data:
                        Object.values(buckets)
                }]
            },

            options: {

                responsive: true,

                maintainAspectRatio: false,

                plugins: {

                    legend: {
                        display: false
                    }
                }
            }
        });
    }


    /*
    ============================================================
    AUTO LOAD
    ============================================================
    */

    refreshDashboard();

</script>

</body>

</html>
```
