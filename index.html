<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR Performance Analytics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-6">

    <div class="max-w-7xl mx-auto space-y-6">

        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold">Talent Calibration Dashboard</h1>
                <p class="text-slate-400 text-sm">
                    Live Google Sheets Integration
                </p>
            </div>

            <button
                onclick="refreshAllData()"
                class="bg-indigo-600 hover:bg-indigo-500 px-5 py-2 rounded-lg font-medium"
            >
                🔄 Sync Data
            </button>
        </div>

        <div
            id="statusBox"
            class="bg-slate-800 border border-slate-700 rounded-lg p-4 text-sm"
        >
            Waiting for sync...
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

            <div class="bg-slate-800 p-5 rounded-xl">
                <p class="text-slate-400 text-sm">Headcount</p>
                <h2 id="headcount" class="text-3xl font-bold mt-2">--</h2>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl">
                <p class="text-slate-400 text-sm">Avg Appraiser</p>
                <h2 id="avgAppraiser" class="text-3xl font-bold mt-2 text-emerald-400">--</h2>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl">
                <p class="text-slate-400 text-sm">Avg Complexity</p>
                <h2 id="avgComplexity" class="text-3xl font-bold mt-2 text-indigo-400">--</h2>
            </div>

            <div class="bg-slate-800 p-5 rounded-xl">
                <p class="text-slate-400 text-sm">Avg Final Score</p>
                <h2 id="avgFinal" class="text-3xl font-bold mt-2 text-amber-400">--</h2>
            </div>

        </div>

        <div class="bg-slate-800 rounded-xl overflow-hidden">

            <div class="p-4 border-b border-slate-700">
                <h3 class="font-semibold">Employee Calibration Matrix</h3>
            </div>

            <div class="overflow-x-auto">

                <table class="w-full text-sm">

                    <thead class="bg-slate-900 text-slate-300">
                        <tr>
                            <th class="p-3 text-left">Emp ID</th>
                            <th class="p-3 text-left">Name</th>
                            <th class="p-3 text-left">Project</th>
                            <th class="p-3 text-center">Self</th>
                            <th class="p-3 text-center">Appraiser</th>
                            <th class="p-3 text-center">Complexity</th>
                            <th class="p-3 text-right">Final</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7" class="text-center p-8 text-slate-500">
                                No data loaded
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>
        </div>

        <div class="bg-slate-800 rounded-xl p-6 h-[450px]">
            <canvas id="scoreChart"></canvas>
        </div>

    </div>

<script>

    /*
    ============================================================
    GOOGLE SHEETS CONFIGURATION
    ============================================================

    IMPORTANT:
    Publish EACH SHEET individually as CSV.

    File → Share → Publish to web

    Choose:
    - Sheet name
    - CSV format

    Then paste URLs below.
    */

    const SHEETS = {

        employeeMaster:
            "PASTE_EMPLOYEE_MASTER_CSV_URL_HERE",

        projectMetrics:
            "PASTE_PROJECT_METRICS_CSV_URL_HERE",

        selfRatings:
            "PASTE_SELF_RATINGS_CSV_URL_HERE",

        appraiserRatings:
            "PASTE_APPRAISER_RATINGS_CSV_URL_HERE"
    };


    /*
    ============================================================
    GLOBAL DATA
    ============================================================
    */

    let parsedData = {
        employeeMaster: [],
        projectMetrics: [],
        selfRatings: [],
        appraiserRatings: []
    };

    let masterMatrix = [];

    let chartInstance = null;


    /*
    ============================================================
    CSV PARSER
    ============================================================
    */

    function splitCSVLine(line) {

        let result = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {

            const char = line[i];

            if (char === '"') {
                inQuotes = !inQuotes;
            }
            else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            }
            else {
                current += char;
            }
        }

        result.push(current.trim());

        return result.map(v =>
            v.replace(/^"(.*)"$/, '$1')
        );
    }

    function parseCSV(text) {

        const lines = text
            .split('\n')
            .map(l => l.trim())
            .filter(Boolean);

        if (!lines.length) return [];

        const headers = splitCSVLine(lines[0]);

        return lines.slice(1).map(line => {

            const values = splitCSVLine(line);

            let row = {};

            headers.forEach((header, index) => {
                row[header] = values[index] || '';
            });

            return row;
        });
    }


    /*
    ============================================================
    FETCH SHEET
    ============================================================
    */

    async function fetchSheet(url) {

        const response = await fetch(url);

        if (!response.ok) {
            throw new Error(`Failed to fetch: ${url}`);
        }

        const csv = await response.text();

        return parseCSV(csv);
    }


    /*
    ============================================================
    REFRESH ALL DATA
    ============================================================
    */

    async function refreshAllData() {

        try {

            setStatus("Loading Google Sheets data...", "blue");

            const [
                employeeMaster,
                projectMetrics,
                selfRatings,
                appraiserRatings
            ] = await Promise.all([

                fetchSheet(SHEETS.employeeMaster),
                fetchSheet(SHEETS.projectMetrics),
                fetchSheet(SHEETS.selfRatings),
                fetchSheet(SHEETS.appraiserRatings)

            ]);

            parsedData.employeeMaster = employeeMaster;
            parsedData.projectMetrics = projectMetrics;
            parsedData.selfRatings = selfRatings;
            parsedData.appraiserRatings = appraiserRatings;

            compileMasterMatrix();

            calculateKPIs();

            renderTable();

            renderChart();

            setStatus("Dashboard synced successfully.", "green");

        }
        catch (err) {

            console.error(err);

            setStatus(err.message, "red");
        }
    }


    /*
    ============================================================
    COMPILE MATRIX
    ============================================================
    */

    function compileMasterMatrix() {

        const selfMap = Object.fromEntries(
            parsedData.selfRatings.map(r => [
                r["Emp ID"],
                r
            ])
        );

        const appraiserMap = Object.fromEntries(
            parsedData.appraiserRatings.map(r => [
                r["Emp ID"],
                r
            ])
        );

        const projectMap = Object.fromEntries(
            parsedData.projectMetrics.map(r => [
                r["Project"],
                r
            ])
        );

        masterMatrix = parsedData.employeeMaster.map(emp => {

            const empId = emp["Emp ID"];

            const project = emp["Project"];

            const self = selfMap[empId] || {};

            const appraiser = appraiserMap[empId] || {};

            const projectMetric = projectMap[project] || {};

            const selfScore =
                parseFloat(self["Weighted Score"]) || 0;

            const appraiserScore =
                parseFloat(appraiser["Weighted Score"]) || 0;

            const complexity =
                parseFloat(
                    projectMetric["Project Complexity Factor"]
                ) || 1;

            const finalScore =
                Number(
                    (appraiserScore * complexity).toFixed(2)
                );

            return {

                empId,
                name: emp["Name"],
                project,
                manager: emp["Manager"],

                selfScore,
                appraiserScore,
                complexity,
                finalScore
            };

        });
    }


    /*
    ============================================================
    KPI CARDS
    ============================================================
    */

    function calculateKPIs() {

        const count = masterMatrix.length;

        if (!count) return;

        const avgAppraiser =
            masterMatrix.reduce(
                (a, b) => a + b.appraiserScore,
                0
            ) / count;

        const avgComplexity =
            masterMatrix.reduce(
                (a, b) => a + b.complexity,
                0
            ) / count;

        const avgFinal =
            masterMatrix.reduce(
                (a, b) => a + b.finalScore,
                0
            ) / count;

        document.getElementById("headcount").innerText = count;

        document.getElementById("avgAppraiser").innerText =
            avgAppraiser.toFixed(2);

        document.getElementById("avgComplexity").innerText =
            avgComplexity.toFixed(2);

        document.getElementById("avgFinal").innerText =
            avgFinal.toFixed(2);
    }


    /*
    ============================================================
    TABLE
    ============================================================
    */

    function renderTable() {

        const tbody =
            document.getElementById("tableBody");

        tbody.innerHTML = masterMatrix.map(row => `

            <tr class="border-b border-slate-700 hover:bg-slate-700/30">

                <td class="p-3">${row.empId}</td>

                <td class="p-3 font-medium">
                    ${row.name}
                </td>

                <td class="p-3">
                    ${row.project}
                </td>

                <td class="p-3 text-center">
                    ${row.selfScore}
                </td>

                <td class="p-3 text-center">
                    ${row.appraiserScore}
                </td>

                <td class="p-3 text-center text-indigo-400">
                    ${row.complexity}
                </td>

                <td class="p-3 text-right text-amber-400 font-bold">
                    ${row.finalScore}
                </td>

            </tr>

        `).join('');
    }


    /*
    ============================================================
    CHART
    ============================================================
    */

    function renderChart() {

        const tiers = {

            "Low": 0,
            "Target": 0,
            "High": 0,
            "Exceptional": 0
        };

        masterMatrix.forEach(item => {

            if (item.finalScore < 2.5)
                tiers.Low++;

            else if (item.finalScore < 4)
                tiers.Target++;

            else if (item.finalScore < 5)
                tiers.High++;

            else
                tiers.Exceptional++;
        });

        const ctx =
            document.getElementById("scoreChart");

        if (chartInstance)
            chartInstance.destroy();

        chartInstance = new Chart(ctx, {

            type: 'bar',

            data: {

                labels: Object.keys(tiers),

                datasets: [{
                    data: Object.values(tiers)
                }]
            },

            options: {

                responsive: true,

                maintainAspectRatio: false,

                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    }


    /*
    ============================================================
    STATUS
    ============================================================
    */

    function setStatus(message, color) {

        const box =
            document.getElementById("statusBox");

        box.innerText = message;

        box.className =
            `rounded-lg p-4 text-sm border`;

        if (color === "green") {
            box.classList.add(
                "bg-emerald-900/30",
                "border-emerald-700",
                "text-emerald-300"
            );
        }

        else if (color === "red") {
            box.classList.add(
                "bg-red-900/30",
                "border-red-700",
                "text-red-300"
            );
        }

        else {
            box.classList.add(
                "bg-blue-900/30",
                "border-blue-700",
                "text-blue-300"
            );
        }
    }

</script>

</body>
</html>
